name: Build Template
on:
  workflow_call:
    inputs: {}
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json
          dotnet-version: "8.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          check-latest: true
      - run: chmod +x ./build.sh
      - run: |
          mkdir -p .ci-logs
          set -o pipefail
          ./build.sh BuildPackAll 2>&1 | tee .ci-logs/build.log
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .nuke/temp/output
            .nuke/temp/test-results
            .ci-logs/build.log
          if-no-files-found: warn
