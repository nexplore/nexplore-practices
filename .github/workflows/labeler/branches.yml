# Configuration for labeler - https://github.com/actions/labeler
"type:enhancement":
  - head-branch:
    - '^feat/'
    - '^feat-'
    - '^feature/'
    - '^feature-'

"type:bug":
  - head-branch:
    - '^fix/'
    - '^fix-'
    - '^bugfix/'
    - '^bugfix-'
    - '^bug/'
    - '^bug-'

"type:documentation":
  - head-branch:
    - '^docs/'
    - '^docs-'
    - '^doc/'
    - '^doc-'
